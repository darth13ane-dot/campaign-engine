name: Build Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$version" -ne $env:GITHUB_REF_NAME) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version v$version."
          }

      - name: Configure update feed
        shell: pwsh
        env:
          CAMPAIGN_ENGINE_UPDATE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/latest/download
        run: pnpm run configure:release

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build installer and portable app
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: pnpm run dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: campaign-engine-windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.json
            dist/*.blockmap

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem dist -File |
            Where-Object { $_.Extension -in ".exe", ".yml", ".json", ".blockmap" } |
            ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME $files --generate-notes --title "Campaign Engine $env:GITHUB_REF_NAME"
